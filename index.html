<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Filesystem Hierarchy Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
                <h1>Linux Filesystem Hierarchy</h1>
            </div>
            <p class="subtitle">An interactive organization chart explaining the Ubuntu/Linux directory structure.</p>
        </header>

        <main class="tree-viewport">
            <div id="tree-container" class="tree-root">
                <!-- Tree will be rendered here -->
            </div>
        </main>

        <footer>
            <div class="legend">
                <span class="legend-item"><span class="v-dot system"></span> System</span>
                <span class="legend-item"><span class="v-dot config"></span> Config</span>
                <span class="legend-item"><span class="v-dot user"></span> User</span>
                <span class="legend-item"><span class="v-dot device"></span> Hardware</span>
            </div>
            <p>Interactive tree • Click nodes to expand • Use horizontal scroll if needed</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
